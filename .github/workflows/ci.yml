name: CI - Python Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check Black formatting
        run: black --check .

      - name: Run Ruff lint
        run: ruff check .

      - name: Run unit tests
        run: pytest -v

      - name: Run Bandit security scan
        run: bandit -r src

      - name: Check project structure
        run: python scripts/check_project_structure.py

  docker:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create fake ML artifact (CI only)
        run: |
          mkdir -p artifacts
          touch artifacts/model_latest.joblib

      - name: Build Backend Docker image
        run: |
          docker build -t housing-backend -f backend/Dockerfile .

      - name: Build Frontend Docker image
        run: |
          docker build -t housing-frontend -f frontend/Dockerfile .

  integration:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/checkout@v4

      - name: Create fake model
        run: |
          mkdir -p artifacts
          touch artifacts/model_latest.joblib

      - name: Start stack with docker compose
        run: |
          docker compose up -d --build

      - name: Wait backend
        run: sleep 10

      - name: Test backend health
        run: curl http://localhost:8000/health

      - name: Stop stack
        run: docker compose down